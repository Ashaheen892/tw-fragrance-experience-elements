<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>معاينة العناصر — بدون محرر</title>
    <style>
      :root {
        --page-bg: #f8f5f2;
        --ink: #2c1810;
        --muted: #64748b;
        --card: #ffffff;
        --line: rgba(23, 32, 51, 0.1);
        --accent: #7c6a4a;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(1200px 500px at 10% -10%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 55%),
          var(--page-bg);
        color: var(--ink);
        font-family: "Segoe UI", Tahoma, "Noto Sans Arabic", sans-serif;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.85rem 1.25rem;
        backdrop-filter: blur(10px);
        background: color-mix(in srgb, var(--page-bg) 90%, #fff);
        border-bottom: 1px solid var(--line);
      }
      .topbar h1 { margin: 0; font-size: 1.05rem; font-weight: 800; }
      .topbar p { margin: 0.15rem 0 0; color: var(--muted); font-size: 0.82rem; }
      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        max-width: 58%;
        justify-content: flex-end;
      }
      .nav a {
        text-decoration: none;
        color: var(--ink);
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--card);
      }
      .nav a:hover { border-color: var(--accent); color: var(--accent); }
      .stage { width: min(1600px, 100%); margin: 0 auto; padding: 1.25rem; }
      .component-card {
        margin: 0 0 2rem;
        overflow: hidden;
        border-radius: 20px;
        background: var(--card);
        border: 1px solid var(--line);
        box-shadow: 0 12px 36px rgba(23, 32, 51, 0.06);
      }
      .card-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.85rem 1.1rem;
        border-bottom: 1px solid var(--line);
      }
      .card-head h2 { margin: 0; font-size: 1rem; font-weight: 800; }
      .card-head code { font-size: 0.72rem; color: var(--muted); }
      .frame { min-height: 640px; }
      body.solo .nav, body.solo .card-head { display: none; }
      body.solo .component-card:not(.is-solo) { display: none; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1 id="page-title">معاينة العناصر — بدون محرر</h1>
        <p>وضع عرض نظيف بدون محرر الإعدادات — مناسب للقطات والـ WebP المتحرك</p>
      </div>
      <nav class="nav" id="nav"></nav>
    </header>
    <main class="stage" id="stage"></main>
    <script type="module">
      // Shim: outside the Twilight runtime, provide registerSallaComponent so
      // sallaTransformPlugin footer can define the custom element.
      if (!Function.prototype.registerSallaComponent) {
        Object.defineProperty(Function.prototype, 'registerSallaComponent', {
          value(tag) {
            if (tag && !customElements.get(tag)) customElements.define(tag, this);
          },
          configurable: true,
          writable: true,
        });
      }

      function arabicTitle(title) {
        if (typeof title === 'string') return title.trim();
        if (title && typeof title === 'object') return String(title.ar || title.en || '').trim();
        return '';
      }

      function buildDefaults(raw) {
        const data = {};
        if (!raw?.fields) return data;
        for (const field of raw.fields) {
          if (!field?.id || field.type === 'static') continue;
          if (String(field.id).startsWith('static-')) continue;
          if (field.type === 'collection') {
            data[field.id] = Array.isArray(field.value) ? field.value : [];
            continue;
          }
          if (field.format === 'dropdown-list' && Array.isArray(field.selected) && field.selected[0]) {
            const pick = field.selected[0];
            data[field.id] =
              pick && typeof pick === 'object' ? pick.value ?? pick.key ?? pick : pick;
            continue;
          }
          if (typeof field.value !== 'undefined') data[field.id] = field.value;
        }
        return data;
      }

      const params = new URLSearchParams(location.search);
      const only = params.get('component');
      if (only) document.body.classList.add('solo');

      const bundle = await fetch('/twilight-bundle.json').then((r) => r.json());
      const components = (bundle.components || []).filter((c) => c?.name);
      document.getElementById('page-title').textContent =
        arabicTitle(bundle.name) || bundle.name || 'معاينة العناصر — بدون محرر';

      const nav = document.getElementById('nav');
      const stage = document.getElementById('stage');

      for (const component of components) {
        const name = component.name;
        if (only && only !== name) continue;
        const title = arabicTitle(component.title) || name;

        const a = document.createElement('a');
        a.href = `#${name}`;
        a.textContent = title;
        nav.appendChild(a);

        const card = document.createElement('section');
        card.className = 'component-card' + (only === name ? ' is-solo' : '');
        card.id = name;
        card.setAttribute('data-component', name);
        card.innerHTML = `
          <div class="card-head">
            <h2>${title}</h2>
            <code>${name}</code>
          </div>
          <div class="frame"></div>
        `;
        stage.appendChild(card);

        try {
          await import(`/src/components/${name}/index.ts`);
        } catch (err) {
          console.error(`Failed to load ${name}`, err);
          continue;
        }
        const el = document.createElement(`salla-${name}`);
        el.config = buildDefaults(component);
        card.querySelector('.frame').appendChild(el);
      }
    </script>
  </body>
</html>
